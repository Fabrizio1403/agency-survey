
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agency Performance Survey</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: #E0DBD0;
    --border2: #C8C2B5;
    --text: #1A1814;
    --text2: #6B6457;
    --text3: #9C9488;
    --accent: #2D5016;
    --accent-light: #EAF0E1;
    --accent-mid: #4A7C28;
    --danger: #8B2E2E;
    --danger-light: #F5E8E8;
    --warn-bg: #FFF8ED;
    --warn-border: #E8C97A;
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page { max-width: 660px; margin: 0 auto; }
  header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }

  .logo-line {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  h1 { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 8px; }
  .tagline { font-size: 14px; color: var(--text2); line-height: 1.6; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .criterion-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .criterion-num.intro-num { background: var(--text2); }

  .card-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .card-desc { font-size: 13px; color: var(--text2); margin-top: 2px; line-height: 1.5; }

  .rule-box {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12.5px;
    color: #7A5C1A;
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 80px auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .combo-wrap { position: relative; }

  .combo-wrap input[type=text] {
    width: 100%;
    padding: 8px 12px;
    font-size: 13.5px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .combo-wrap input[type=text]:focus { border-color: var(--accent-mid); }

  .dropdown {
    position: absolute;
    top: calc(100% + 3px);
    left: 0; right: 0;
    max-height: 200px;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    z-index: 200;
    display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .dropdown.open { display: block; }

  .opt {
    padding: 8px 12px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
    transition: background 0.1s;
  }
  .opt:hover, .opt.active { background: var(--accent-light); color: var(--accent); }
  .opt.selected { font-weight: 500; color: var(--accent); }
  .opt-empty { padding: 8px 12px; font-size: 13px; color: var(--text3); }

  .pts-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .pts-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; }
  .pts-cell input[type=number] {
    width: 70px;
    padding: 8px 6px;
    text-align: center;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .pts-cell input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }

  .remove-btn {
    width: 30px; height: 30px;
    border: none; background: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .remove-btn:hover { background: var(--danger-light); color: var(--danger); }

  .add-btn {
    font-size: 13px;
    color: var(--accent-mid);
    background: var(--accent-light);
    border: 1px dashed var(--accent-mid);
    border-radius: var(--radius);
    padding: 7px 14px;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-btn:hover { background: #D8EAC5; }
  .add-btn:disabled { opacity: 0.35; cursor: default; }

  .total-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text2);
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 99px;
  }
  .badge.ok { background: var(--accent-light); color: var(--accent); }
  .badge.warn { background: var(--danger-light); color: var(--danger); }

  .name-input {
    width: 100%;
    padding: 10px 14px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .name-input:focus { border-color: var(--accent-mid); }

  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .submit-btn {
    width: 100%;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: white;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover:not(:disabled) { background: var(--accent-mid); }
  .submit-btn:active:not(:disabled) { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.35; cursor: default; }

  .success-wrap {
    text-align: center;
    padding: 3rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
  }

  .check-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 24px;
  }

  .success-wrap h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .success-wrap p { font-size: 14px; color: var(--text2); line-height: 1.6; }

  .error-msg {
    background: var(--danger-light);
    border: 1px solid #DDA0A0;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-top: 10px;
    display: none;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>
<div class="page">

  <header>
    <div class="logo-line">Internal Survey — Confidential</div>
    <h1>Agency Performance Survey</h1>
    <p class="tagline">Rate your peers across three key criteria. Your responses are anonymous.</p>
  </header>

  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width:0%"></div>
  </div>

  <div id="app"></div>

</div>

<script>
// --- CONFIG: Your Apps Script URL --- 
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyx212LC48zJz1Qgt277tKnqGVNRbV41v8DQjpX2LOKbE0UfEzwDYKTjC1Jy5VGHe_4vg/exec";

// --- Main Script (unchanged from before) ---

const AGENCIES = Array.from({length: 60}, (_, i) => `Agency ${i+1}`);
const CRITERIA = [
  { id: 'c1', label: 'Technical support', desc: 'Quality and effectiveness of technical assistance provided.' },
  { id: 'c2', label: 'Response time & handling costs', desc: 'Speed of response and efficiency in managing costs.' },
  { id: 'c3', label: 'Operational coordination and updates', desc: 'Quality of coordination, communication and status updates.' },
];
const MAX_PICKS = 3;
const TOTAL_PTS = 5;

let state = {
  phase: 'intro',
  name: '',
  myAgency: '',
  myAgencyTyped: '',
  myDropdownOpen: false,
  criteria: { c1: [{agency:'',pts:0}], c2: [{agency:'',pts:0}], c3: [{agency:'',pts:0}] },
  openDropdown: null,
  filterText: {},
  submitting: false,
  error: '',
};

const app = document.getElementById('app');

function availableAgencies() {
  return AGENCIES.filter(a => a !== state.myAgency);
}

function filteredOpts(cid, idx) {
  const key = cid+'-'+idx;
  const txt = (state.filterText[key]||'').toLowerCase();
  const used = state.criteria[cid].filter((_,i)=>i!==idx).map(r=>r.agency).filter(Boolean);
  return availableAgencies().filter(a => !used.includes(a) && a.toLowerCase().includes(txt));
}

function totalPts(cid) {
  return state.criteria[cid].reduce((s,r)=>s+(parseInt(r.pts)||0),0);
}

function criterionValid(cid) {
  const filled = state.criteria[cid].filter(r=>r.agency!=='');
  return filled.length > 0 && totalPts(cid) === TOTAL_PTS;
}

function allValid() {
  return state.name.trim() && state.myAgency && CRITERIA.every(c=>criterionValid(c.id));
}

function progressPct() {
  if (state.phase === 'intro') return 0;
  if (state.phase === 'done') return 100;
  let done = 0;
  if (state.name.trim() && state.myAgency) done++;
  CRITERIA.forEach(c => { if (criterionValid(c.id)) done++; });
  return Math.round((done / 4) * 100);
}

function render() {
  document.getElementById('progress').style.width = progressPct() + '%';
  if (state.phase === 'intro') renderIntro();
  else if (state.phase === 'survey') renderSurvey();
  else renderDone();
}

function comboHtml(cid, idx, val, isOpen, opts) {
  const key = cid+'-'+idx;
  const displayVal = state.filterText[key] !== undefined ? state.filterText[key] : val;
  return `
    <div class="combo-wrap" data-key="${key}">
      <input type="text" class="agency-input" data-cid="${cid}" data-idx="${idx}"
        placeholder="Search agency…" autocomplete="off" value="${displayVal.replace(/"/g,'&quot;')}" />
      <div class="dropdown ${isOpen?'open':''}" id="dd-${key}">
        ${opts.length === 0
          ? '<div class="opt-empty">No results</div>'
          : opts.slice(0,15).map(a=>`<div class="opt${a===val?' selected':''}" data-val="${a}" data-cid="${cid}" data-idx="${idx}">${a}</div>`).join('')
        }
      </div>
    </div>
  `;
}

function renderIntro() {
  const myOpts = AGENCIES.filter(a=>a.toLowerCase().includes((state.myAgencyTyped||'').toLowerCase()));
  app.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="criterion-num intro-num">1</div>
        <div>
          <div class="card-title">Your details</div>
          <div class="card-desc">This helps us track submissions and exclude your own agency from your vote.</div>
        </div>
      </div>
      <input type="text" class="name-input" id="name-input" placeholder="Your full name" value="${state.name}" />
      <div class="combo-wrap" id="my-combo">
        <input type="text" id="my-agency-input" placeholder="Your agency — type to search…" autocomplete="off"
          value="${state.myAgencyTyped||''}" style="width:100%;padding:10px 14px;font-size:14px;border:1px solid var(--border);border-radius:var(--radius);" />
        <div class="dropdown ${state.myDropdownOpen?'open':''}" id="my-dd">
          ${myOpts.length===0
            ? '<div class="opt-empty">No results</div>'
            : myOpts.slice(0,15).map(a=>`<div class="opt${a===state.myAgency?' selected':''}" data-my-val="${a}">${a}</div>`).join('')
          }
        </div>
      </div>
      ${state.myAgency ? `<p style="font-size:12px;color:var(--accent);margin-top:6px;">✓ ${state.myAgency} selected — this agency will be excluded.</p>` : ''}
    </div>
    <button class="submit-btn" id="next-btn" ${state.name.trim()&&state.myAgency?'':'disabled'}>Continue to survey →</button>
  `;

  document.getElementById('name-input').addEventListener('input', e => { state.name = e.target.value; render(); });
  document.getElementById('my-agency-input').addEventListener('input', e => {
    state.myAgencyTyped = e.target.value;
    state.myDropdownOpen = true;
    if (!e.target.value) state.myAgency = '';
    render();
  });
  document.getElementById('my-agency-input').addEventListener('focus', () => { state.myDropdownOpen = true; render(); });
  document.querySelectorAll('[data-my-val]').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      state.myAgency = el.dataset.myVal;
      state.myAgencyTyped = el.dataset.myVal;
      state.myDropdownOpen = false;
      render();
    });
  });
  document.addEventListener('mousedown', function h(e) {
    const mc = document.getElementById('my-combo');
    if (mc && !mc.contains(e.target)) { state.myDropdownOpen = false; document.removeEventListener('mousedown', h); render(); }
  });
  const nb = document.getElementById('next-btn');
  if (nb) nb.addEventListener('click', () => { if (state.name.trim()&&state.myAgency) { state.phase='survey'; render(); } });
}

function renderSurvey() {
  let html = `<div class="rule-box">
    For each criterion below, select up to 3 agencies and assign a total of exactly 5 points.
  </div>`;

  CRITERIA.forEach((c, ci) => {
    const rows = state.criteria[c.id];
    const tot = totalPts(c.id);
    const valid = criterionValid(c.id);
    html += `
      <div class="card">
        <div class="card-header">
          <div class="criterion-num">${ci+1}</div>
          <div><div class="card-title">${c.label}</div>
            <div class="card-desc">${c.desc}</div>
          </div>
        </div>
    `;
    rows.forEach((row, idx) => {
      const key = c.id+'-'+idx;
      const isOpen = state.openDropdown === key;
      const opts = filteredOpts(c.id, idx);
      html += `
        <div class="row">
          ${comboHtml(c.id, idx, row.agency, isOpen, opts)}
          <div class="pts-cell">
            <span class="pts-label">Points</span>
            <input type="number" min="0" max="${TOTAL_PTS}" step="1" value="${row.pts}"
              data-cid="${c.id}" data-idx="${idx}" class="pts-input" />
          </div>
          ${rows.length>1 ? `<button class="remove-btn" data-cid="${c.id}" data-idx="${idx}" title="Remove">✕</button>` : '<div style="width:30px"></div>'}
        </div>
      `;
    });
    html += `
      ${rows.length<MAX_PICKS ? `<button class="add-btn" data-cid="${c.id}">+ Add agency</button>` : ''}
      <div class="total-row">
        <span>Total points assigned</span>
        <span class="badge ${valid?'ok':'warn'}">${tot} / ${TOTAL_PTS}</span>
      </div>
    </div>`;
  });

  html += `
    <div class="error-msg" id="err-msg">${state.error}</div>
    <button class="submit-btn" id="submit-btn" ${allValid()?'':'disabled'}>
      ${state.submitting?'<span class="spinner"></span>Submitting…':'Submit survey'}
    </button>
  `;

  app.innerHTML = html;

  if (state.error) { const em = document.getElementById('err-msg'); if(em) em.style.display='block'; }

  document.querySelectorAll('.agency-input').forEach(input => {
    const cid = input.dataset.cid, idx = parseInt(input.dataset.idx), key = cid+'-'+idx;
    input.addEventListener('focus', () => { state.openDropdown = key; if(state.filterText[key]===undefined) state.filterText[key]=''; render(); });
    input.addEventListener('input', e => {
      state.filterText[key] = e.target.value;
      state.openDropdown = key;
      if (!e.target.value) { state.criteria[cid][idx].agency=''; }
      render();
    });
  });

  document.querySelectorAll('.dropdown .opt[data-val]').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault();
      const cid=el.dataset.cid, idx=parseInt(el.dataset.idx), key=cid+'-'+idx;
      state.criteria[cid][idx].agency = el.dataset.val;
      state.filterText[key] = el.dataset.val;
      state.openDropdown = null;
      render();
    });
  });

  document.querySelectorAll('.pts-input').forEach(input => {
    const cid=input.dataset.cid, idx=parseInt(input.dataset.idx);
    input.addEventListener('input', e => { state.criteria[cid][idx].pts = parseInt(e.target.value)||0; render(); });
  });

  document.querySelectorAll('.remove-btn').forEach(btn => {
    const cid=btn.dataset.cid, idx=parseInt(btn.dataset.idx);
    btn.addEventListener('click', () => { state.criteria[cid].splice(idx,1); state.openDropdown=null; render(); });
  });

  document.querySelectorAll('.add-btn').forEach(btn => {
    const cid=btn.dataset.cid;
    btn.addEventListener('click', () => { if(state.criteria[cid].length<MAX_PICKS) state.criteria[cid].push({agency:'',pts:0}); render(); });
  });

  document.addEventListener('mousedown', function h(e) {
    if (state.openDropdown && !e.target.closest('.combo-wrap')) {
      state.openDropdown = null; document.removeEventListener('mousedown', h); render();
    }
  }, { once: true });

  const sb = document.getElementById('submit-btn');
  if (sb) sb.addEventListener('click', submitSurvey);
}

function renderDone() {
  app.innerHTML = `
    <div class="success-wrap">
      <div class="check-circle">✓</div>
      <h2>Survey submitted!</h2>
      <p>Thank you, <strong>${state.name}</strong>. Your responses have been recorded.</p>
    </div>
  `;
}

async function submitSurvey() {
  if (!allValid() || state.submitting) return;
  state.submitting = true;
  state.error = '';
  render();

  const payload = {
    timestamp: new Date().toISOString(),
    name: state.name,
    myAgency: state.myAgency,
  };

  CRITERIA.forEach(c => {
    state.criteria[c.id].forEach((row, i) => {
      if (row.agency) {
        payload[`${c.id}_agency${i+1}`] = row.agency;
        payload[`${c.id}_pts${i+1}`] = row.pts;
      }
    });
  });

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    state.phase = 'done';
    state.submitting = false;
    render();
  } catch(err) {
    state.submitting = false;
    state.error = 'Something went wrong. Please try again.';
    render();
  }
}

render();
</script>

</body>
</html>
